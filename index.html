<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

function waitForFirebase() {
  return new Promise((resolve) => {
    if (window.__firebase) return resolve(window.__firebase);
    window.addEventListener("firebase-ready", () => resolve(window.__firebase), { once: true });
  });
}

const todayStr = () => new Date().toISOString().slice(0, 10);
const daysBetween = (a, b) => Math.floor((new Date(b) - new Date(a)) / 86400000);
const fmtDaysAgo = (n) => {
  if (n <= 0) return "今日";
  if (n < 30) return `${n}日前`;
  if (n < 365) return `${Math.round(n / 30)}ヶ月前`;
  return `${Math.floor(n / 365)}年前`;
};
const fmtTenure = (dateStr) => {
  if (!dateStr) return null;
  const n = daysBetween(dateStr, todayStr());
  if (n < 30) return `${n}日`;
  if (n < 365) return `${Math.round(n / 30)}ヶ月`;
  const y = Math.floor(n / 365);
  const m = Math.round((n % 365) / 30);
  return m > 0 ? `${y}年${m}ヶ月` : `${y}年`;
};

const INTERVAL_PRESETS = [
  { label: "1ヶ月", days: 30 },
  { label: "3ヶ月", days: 90 },
  { label: "6ヶ月", days: 180 },
];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function resizeImageFile(file, maxDim = 220, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxDim) { h = Math.round(h * (maxDim / w)); w = maxDim; }
        else if (h >= w && h > maxDim) { w = Math.round(w * (maxDim / h)); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function intervalLabel(days) {
  const preset = INTERVAL_PRESETS.find((p) => p.days === days);
  if (preset) return preset.label;
  return `${days}日`;
}

// ---------- Auth screen ----------
function AuthScreen({ fb }) {
  const [mode, setMode] = useState("login"); // "login" | "signup"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setError("");
    if (!email || !password) { setError("メールアドレスとパスワードを入力してください"); return; }
    setBusy(true);
    try {
      if (mode === "signup") {
        await fb.createUserWithEmailAndPassword(fb.auth, email, password);
      } else {
        await fb.signInWithEmailAndPassword(fb.auth, email, password);
      }
    } catch (e) {
      setError(errorMessage(e));
    }
    setBusy(false);
  };

  const errorMessage = (e) => {
    const code = e && e.code ? e.code : "";
    if (code.includes("wrong-password") || code.includes("invalid-credential")) return "メールアドレスまたはパスワードが違います";
    if (code.includes("email-already-in-use")) return "このメールアドレスは既に登録されています";
    if (code.includes("weak-password")) return "パスワードは6文字以上にしてください";
    if (code.includes("invalid-email")) return "メールアドレスの形式が正しくありません";
    if (code.includes("user-not-found")) return "このメールアドレスは登録されていません";
    return "エラーが発生しました。しばらくしてから再度お試しください。";
  };

  return (
    <div style={{ ...styles.page, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ ...styles.modal, borderRadius: 6, maxWidth: 360 }}>
        <div style={styles.headerTitleRow}>
          <span style={styles.stampMark}>印</span>
          <h1 style={styles.title}>名刺帳</h1>
        </div>
        <p style={{ ...styles.subtitle, marginBottom: 18 }}>
          {mode === "login" ? "ログインして記録を見る" : "新しくアカウントを作る"}
        </p>
        <Field label="メールアドレス">
          <input style={styles.input} type="email" value={email} onChange={(e) => setEmail(e.target.value)} />
        </Field>
        <Field label="パスワード（6文字以上）">
          <input style={styles.input} type="password" value={password} onChange={(e) => setPassword(e.target.value)} />
        </Field>
        {error && <p style={{ color: "#B23A2E", fontSize: 12.5, marginTop: -4, marginBottom: 10 }}>{error}</p>}
        <button style={{ ...styles.submitButton, ...(busy ? styles.submitButtonDisabled : {}) }} disabled={busy} onClick={submit}>
          {busy ? "処理中…" : mode === "login" ? "ログイン" : "登録する"}
        </button>
        <button
          style={{ ...styles.linkButton, marginTop: 14, fontSize: 12.5, justifyContent: "center", width: "100%" }}
          onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); }}
        >
          {mode === "login" ? "アカウントを持っていない方はこちら" : "既にアカウントをお持ちの方はこちら"}
        </button>
      </div>
    </div>
  );
}

// ---------- Main app ----------
function PersonMemoryBook({ fb, user }) {
  const [loaded, setLoaded] = useState(false);
  const [people, setPeople] = useState([]);
  const [settings, setSettings] = useState({ intervalDays: 90 });
  const [view, setView] = useState("list");
  const [showAdd, setShowAdd] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [transferFor, setTransferFor] = useState(null);
  const [episodeFor, setEpisodeFor] = useState(null);
  const [editFor, setEditFor] = useState(null);
  const [detailFor, setDetailFor] = useState(null);
  const [saveError, setSaveError] = useState(false);
  const [secretUnlocked, setSecretUnlocked] = useState(false);
  const [isPressingStamp, setIsPressingStamp] = useState(false);
  const [pageFlash, setPageFlash] = useState(false);
  const pressTimerRef = useRef(null);
  const userDocRef = fb.doc(fb.db, "users", user.uid);
  const skipNextWrite = useRef(false);

  useEffect(() => {
    const unsub = fb.onSnapshot(userDocRef, (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        skipNextWrite.current = true;
        setPeople(data.people || []);
        setSettings(data.settings || { intervalDays: 90 });
      }
      setLoaded(true);
    }, () => setLoaded(true));
    return unsub;
  }, []);

  const persist = useCallback(async (nextPeople, nextSettings) => {
    try {
      const result = await fb.setDoc(userDocRef, { people: nextPeople, settings: nextSettings });
      setSaveError(false);
    } catch (e) {
      setSaveError(true);
    }
  }, []);

  useEffect(() => {
    if (!loaded) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    persist(people, settings);
  }, [people, settings, loaded, persist]);

  const addPerson = (form) => {
    const initialEpisodes = form.notes.trim() ? [{ date: form.metDate, note: form.notes.trim() }] : [];
    const newPerson = {
      id: uid(), name: form.name, workplace: form.workplace, role: form.role,
      metDate: form.metDate, workplaceStart: form.workplaceStart, notes: form.notes,
      photo: form.photo || null, lastReviewed: todayStr(), history: [], episodes: initialEpisodes,
      secret: !!form.secret,
    };
    setPeople((p) => [newPerson, ...p]);
    setShowAdd(false);
  };

  const confirmReviewed = (id) => {
    setPeople((p) => p.map((person) => (person.id === id ? { ...person, lastReviewed: todayStr() } : person)));
  };

  const doTransfer = (id, form) => {
    setPeople((p) => p.map((person) => {
      if (person.id !== id) return person;
      const historyEntry = { workplace: person.workplace, role: person.role, startDate: person.workplaceStart, endDate: form.startDate };
      return { ...person, workplace: form.workplace, role: form.role, workplaceStart: form.startDate, history: [...person.history, historyEntry] };
    }));
    setTransferFor(null);
  };

  const addEpisode = (id, form) => {
    setPeople((p) => p.map((person) => {
      if (person.id !== id) return person;
      return { ...person, notes: form.note, lastReviewed: todayStr(), episodes: [...person.episodes, { date: form.date, note: form.note }] };
    }));
    setEpisodeFor(null);
  };

  const updatePerson = (id, form) => {
    setPeople((p) => p.map((person) => {
      if (person.id !== id) return person;
      return {
        ...person,
        name: form.name,
        workplace: form.workplace,
        role: form.role,
        metDate: form.metDate,
        workplaceStart: form.workplaceStart,
        notes: form.notes,
        photo: form.photo,
        secret: !!form.secret,
      };
    }));
    setEditFor(null);
  };

  const deletePerson = (id) => {
    setPeople((p) => p.filter((person) => person.id !== id));
    setEditFor(null);
  };

  const fadeAmount = (person) => {
    const d = daysBetween(person.lastReviewed, todayStr());
    return Math.min(1, Math.max(0, d / settings.intervalDays));
  };
  const isDue = (person) => fadeAmount(person) >= 1;
  const visiblePeople = people.filter((p) => !p.secret || secretUnlocked);
  const dueList = [...visiblePeople].filter(isDue).sort((a, b) => daysBetween(b.lastReviewed, todayStr()) - daysBetween(a.lastReviewed, todayStr()));

  const handleStampPressStart = () => {
    setIsPressingStamp(true);
    if (pressTimerRef.current) clearTimeout(pressTimerRef.current);
    pressTimerRef.current = setTimeout(() => {
      setSecretUnlocked((v) => !v);
      setPageFlash(true);
      setTimeout(() => setPageFlash(false), 220);
      pressTimerRef.current = null;
    }, 3000);
  };

  const handleStampPressEnd = () => {
    setIsPressingStamp(false);
    if (pressTimerRef.current) {
      clearTimeout(pressTimerRef.current);
      pressTimerRef.current = null;
    }
  };

  if (!loaded) {
    return (
      <div style={{ ...styles.page, alignItems: "center", justifyContent: "center", display: "flex" }}>
        <div style={{ color: "#8a8477" }}>読み込み中…</div>
      </div>
    );
  }

  return (
    <div
      style={{
        ...styles.page,
        backgroundColor: pageFlash ? "#E3B7AC" : isPressingStamp ? "#E2DCCC" : "#EFEDE4",
        transition: "background-color 0.2s ease",
      }}
    >
      <header style={styles.header}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={styles.headerTitleRow}>
              <span
                style={{ ...styles.stampMark, ...(isPressingStamp ? styles.stampMarkPressed : {}), userSelect: "none", WebkitTouchCallout: "none" }}
                onPointerDown={handleStampPressStart}
                onPointerUp={handleStampPressEnd}
                onPointerLeave={handleStampPressEnd}
                onPointerCancel={handleStampPressEnd}
                onContextMenu={(e) => e.preventDefault()}
              >印</span>
              <h1 style={styles.title}>名刺帳</h1>
            </div>
            <p style={styles.subtitle}>久しぶりに会った人を、忘れる前に。</p>
          </div>
          <button style={styles.logoutButton} onClick={() => fb.signOut(fb.auth)}>ログアウト</button>
        </div>
        <p style={{ fontSize: 11, color: "#8a8477", marginTop: 6, fontFamily: "'JetBrains Mono', monospace" }}>{user.email}</p>
      </header>

      <nav style={styles.tabs}>
        <TabButton active={view === "list"} onClick={() => setView("list")} label="👥 一覧" />
        <TabButton active={view === "review"} onClick={() => setView("review")} label={`🔄 復習${dueList.length > 0 ? ` (${dueList.length})` : ""}`} />
        <TabButton active={view === "settings"} onClick={() => setView("settings")} label="⚙ 設定" />
      </nav>

      <main style={styles.main}>
        {view === "list" && (
          <React.Fragment>
            {secretUnlocked && (
              <div style={styles.secretBanner}>
                <span>🔓 シークレット表示中</span>
                <button style={styles.secretHideButton} onClick={() => setSecretUnlocked(false)}>隠す</button>
              </div>
            )}
            <button style={styles.addButton} onClick={() => setShowAdd(true)}>＋ 新しく記録する</button>
            {visiblePeople.length === 0 ? (
              <EmptyState text="まだ誰も記録していません。「新しく記録する」から始めましょう。" />
            ) : (
              <div style={styles.cardList}>
                {visiblePeople.map((person) => (
                  <PersonCard key={person.id} person={person} fade={fadeAmount(person)}
                    expanded={expandedId === person.id} onToggleExpand={() => setExpandedId(expandedId === person.id ? null : person.id)}
                    onReviewed={() => confirmReviewed(person.id)} onTransfer={() => setTransferFor(person.id)}
                    onEpisode={() => setEpisodeFor(person.id)} onEdit={() => setEditFor(person.id)} onOpenDetail={() => setDetailFor(person.id)} />
                ))}
              </div>
            )}
          </React.Fragment>
        )}

        {view === "review" && (
          <React.Fragment>
            <p style={styles.reviewIntro}>前回の設定（{intervalLabel(settings.intervalDays)}）を過ぎた記録です。読んで、思い出せたらスタンプを押しましょう。</p>
            {dueList.length === 0 ? (
              <EmptyState text="今、復習が必要な人はいません。よく覚えていますね。" />
            ) : (
              <div style={styles.cardList}>
                {dueList.map((person) => (
                  <PersonCard key={person.id} person={person} fade={1} expanded={true} onToggleExpand={() => {}}
                    onReviewed={() => confirmReviewed(person.id)} onTransfer={() => setTransferFor(person.id)}
                    onEpisode={() => setEpisodeFor(person.id)} onEdit={() => setEditFor(person.id)} onOpenDetail={() => setDetailFor(person.id)} reviewMode />
                ))}
              </div>
            )}
          </React.Fragment>
        )}

        {view === "settings" && <SettingsPanel settings={settings} setSettings={setSettings} />}
      </main>

      {saveError && <div style={styles.saveError}>保存に失敗しました。通信状態を確認してください。</div>}
      {showAdd && <AddPersonModal onClose={() => setShowAdd(false)} onSubmit={addPerson} />}
      {transferFor && <TransferModal person={people.find((p) => p.id === transferFor)} onClose={() => setTransferFor(null)} onSubmit={(form) => doTransfer(transferFor, form)} />}
      {episodeFor && <EpisodeModal person={people.find((p) => p.id === episodeFor)} onClose={() => setEpisodeFor(null)} onSubmit={(form) => addEpisode(episodeFor, form)} />}
      {detailFor && (
        <DetailModal
          person={people.find((p) => p.id === detailFor)}
          onClose={() => setDetailFor(null)}
          onReviewed={() => confirmReviewed(detailFor)}
        />
      )}
      {editFor && (
        <EditPersonModal
          person={people.find((p) => p.id === editFor)}
          onClose={() => setEditFor(null)}
          onSubmit={(form) => updatePerson(editFor, form)}
          onDelete={() => { if (window.confirm("この人の記録を削除しますか？元に戻せません。")) deletePerson(editFor); }}
        />
      )}
    </div>
  );
}

const CROP_FRAME = 260;
const CROP_OUTPUT = 480;

function PhotoCropModal({ file, onCancel, onConfirm }) {
  const imgElRef = useRef(null);
  const [imgSrc, setImgSrc] = useState(null);
  const [natural, setNatural] = useState(null);
  const [baseScale, setBaseScale] = useState(1);
  const [zoom, setZoom] = useState(1);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const dragState = useRef(null);
  const pointers = useRef(new Map());

  useEffect(() => {
    const reader = new FileReader();
    reader.onload = (ev) => setImgSrc(ev.target.result);
    reader.readAsDataURL(file);
  }, [file]);

  useEffect(() => {
    if (!imgSrc) return;
    const img = new Image();
    img.onload = () => {
      setNatural({ w: img.naturalWidth, h: img.naturalHeight });
      setBaseScale(CROP_FRAME / Math.min(img.naturalWidth, img.naturalHeight));
      setZoom(1);
      setPan({ x: 0, y: 0 });
    };
    img.src = imgSrc;
  }, [imgSrc]);

  const clampPan = (p, z, nat) => {
    if (!nat) return p;
    const dw = nat.w * baseScale * z;
    const dh = nat.h * baseScale * z;
    const maxX = Math.max(0, (dw - CROP_FRAME) / 2);
    const maxY = Math.max(0, (dh - CROP_FRAME) / 2);
    return { x: Math.min(maxX, Math.max(-maxX, p.x)), y: Math.min(maxY, Math.max(-maxY, p.y)) };
  };

  const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

  const onPointerDown = (e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    pointers.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.current.size === 1) {
      dragState.current = { mode: "pan", start: { x: e.clientX, y: e.clientY }, startPan: pan };
    } else if (pointers.current.size === 2) {
      const pts = [...pointers.current.values()];
      dragState.current = { mode: "pinch", startDist: dist(pts[0], pts[1]), startZoom: zoom, startMid: mid(pts[0], pts[1]), startPan: pan };
    }
  };

  const onPointerMove = (e) => {
    if (!pointers.current.has(e.pointerId)) return;
    pointers.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (!dragState.current || !natural) return;
    if (dragState.current.mode === "pan" && pointers.current.size === 1) {
      const dx = e.clientX - dragState.current.start.x;
      const dy = e.clientY - dragState.current.start.y;
      setPan(clampPan({ x: dragState.current.startPan.x + dx, y: dragState.current.startPan.y + dy }, zoom, natural));
    } else if (dragState.current.mode === "pinch" && pointers.current.size === 2) {
      const pts = [...pointers.current.values()];
      const curDist = dist(pts[0], pts[1]);
      const curMid = mid(pts[0], pts[1]);
      const newZoom = Math.min(3, Math.max(1, dragState.current.startZoom * (curDist / dragState.current.startDist)));
      const dx = curMid.x - dragState.current.startMid.x;
      const dy = curMid.y - dragState.current.startMid.y;
      setZoom(newZoom);
      setPan(clampPan({ x: dragState.current.startPan.x + dx, y: dragState.current.startPan.y + dy }, newZoom, natural));
    }
  };

  const endPointer = (e) => {
    pointers.current.delete(e.pointerId);
    if (pointers.current.size === 0) {
      dragState.current = null;
    } else if (pointers.current.size === 1) {
      const remaining = [...pointers.current.values()][0];
      dragState.current = { mode: "pan", start: remaining, startPan: pan };
    }
  };

  const onWheel = (e) => {
    e.preventDefault();
    const newZoom = Math.min(3, Math.max(1, zoom + (e.deltaY > 0 ? -0.05 : 0.05)));
    setZoom(newZoom);
    setPan((p) => clampPan(p, newZoom, natural));
  };

  const handleZoomSlider = (e) => {
    const newZoom = parseFloat(e.target.value);
    setZoom(newZoom);
    setPan((p) => clampPan(p, newZoom, natural));
  };

  const confirm = () => {
    if (!natural) return;
    const canvas = document.createElement("canvas");
    canvas.width = CROP_OUTPUT; canvas.height = CROP_OUTPUT;
    const ctx = canvas.getContext("2d");
    const exportScale = CROP_OUTPUT / CROP_FRAME;
    const displayScale = baseScale * zoom;
    ctx.save();
    ctx.translate(CROP_OUTPUT / 2 + pan.x * exportScale, CROP_OUTPUT / 2 + pan.y * exportScale);
    ctx.scale(displayScale * exportScale, displayScale * exportScale);
    ctx.drawImage(imgElRef.current, -natural.w / 2, -natural.h / 2);
    ctx.restore();
    onConfirm(canvas.toDataURL("image/jpeg", 0.82));
  };

  if (!imgSrc || !natural) {
    return (
      <div style={cropStyles.overlay} onClick={onCancel}>
        <div style={cropStyles.modal} onClick={(e) => e.stopPropagation()}>
          <p style={{ textAlign: "center", color: "#8a8477", margin: 0 }}>読み込み中…</p>
        </div>
      </div>
    );
  }

  const dw = natural.w * baseScale * zoom;
  const dh = natural.h * baseScale * zoom;

  return (
    <div style={cropStyles.overlay} onClick={onCancel}>
      <div style={cropStyles.modal} onClick={(e) => e.stopPropagation()}>
        <h2 style={cropStyles.title}>写真の位置を調整</h2>
        <p style={cropStyles.hint}>ドラッグで位置、スライダーやピンチで拡大縮小できます</p>
        <div
          style={{ ...cropStyles.frame, touchAction: "none" }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={endPointer}
          onPointerCancel={endPointer}
          onWheel={onWheel}
        >
          <img
            ref={imgElRef}
            src={imgSrc}
            alt=""
            draggable={false}
            style={{
              position: "absolute", top: "50%", left: "50%",
              width: dw, height: dh,
              transform: `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px)`,
              userSelect: "none", pointerEvents: "none",
            }}
          />
        </div>
        <input type="range" min="1" max="3" step="0.01" value={zoom} onChange={handleZoomSlider} style={cropStyles.slider} />
        <div style={cropStyles.buttonRow}>
          <button style={cropStyles.cancelButton} onClick={onCancel}>キャンセル</button>
          <button style={cropStyles.confirmButton} onClick={confirm}>決定</button>
        </div>
      </div>
    </div>
  );
}

function PhotoField({ value, onChange }) {
  const inputRef = useRef();
  const [cropFile, setCropFile] = useState(null);
  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setCropFile(file);
    e.target.value = "";
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <Avatar photo={value} name="" size={56} />
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        <button type="button" style={styles.photoButton} onClick={() => inputRef.current.click()}>📷 {value ? "写真を変更" : "写真を追加"}</button>
        {value && <button type="button" style={styles.photoRemoveButton} onClick={() => onChange(null)}>削除</button>}
        <input ref={inputRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
      </div>
      {cropFile && (
        <PhotoCropModal
          file={cropFile}
          onCancel={() => setCropFile(null)}
          onConfirm={(dataUrl) => { onChange(dataUrl); setCropFile(null); }}
        />
      )}
    </div>

  );
}

// ---------- Root: waits for Firebase, handles auth state ----------
function Root() {
  const [fb, setFb] = useState(null);
  const [user, setUser] = useState(undefined); // undefined = loading, null = signed out

  useEffect(() => {
    waitForFirebase().then((firebase) => {
      setFb(firebase);
      firebase.onAuthStateChanged(firebase.auth, (u) => setUser(u || null));
    });
  }, []);

  if (!fb || user === undefined) {
    return <div style={{ ...styles.page, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: "#8a8477" }}>読み込み中…</div></div>;
  }
  if (!user) return <AuthScreen fb={fb} />;
  return <PersonMemoryBook fb={fb} user={user} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
